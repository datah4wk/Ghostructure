<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>403</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
        body{display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#e0e0e0}
        .container{text-align:center;padding:2rem}
        .code{font-size:8rem;font-weight:700;color:#1a1a1a;text-shadow:0 0 40px rgba(255,255,255,0.03);line-height:1;margin-bottom:1rem;letter-spacing:-0.05em}
        .message{font-size:1.125rem;color:#404040;font-weight:400;letter-spacing:0.05em;text-transform:uppercase}
        .line{width:60px;height:1px;background:#1a1a1a;margin:1.5rem auto}
        .sub{font-size:0.8125rem;color:#252525;margin-top:0;font-weight:300}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">403</div>
        <div class="line"></div>
        <div class="message">Forbidden</div>
        <div class="line"></div>
        <div class="sub">You do not have permission to access this resource.</div>
    </div>
</body>
</html>
